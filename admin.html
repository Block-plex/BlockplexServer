<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
</head>
<body>
    <textarea id="map" style="width:100%;height:300px;"></textarea>
<button onclick="upload()">Upload Map</button>

<script>
function upload() {
    fetch("/setmap", {
        method: "POST",
        body: document.getElementById("map").value
    }).then(r => alert("Map updated!"));
}
</script>
</body>
</html>
